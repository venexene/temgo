name: Temgo CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: go build ./...
      - run: go vet ./...

      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - run: go test ./... -race